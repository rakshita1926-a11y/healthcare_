<!DOCTYPE html>
<html>
<head>
<title>Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">🏥 Healthcare System</span>
<div>
<a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
<a href="/view" class="btn btn-light btn-sm">Records</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>
</nav>

<div class="container mt-4">

<h3>🔍 Search Patient</h3>

<form method="post">
<input class="form-control mb-2" name="pid" placeholder="Enter Patient ID">
<button class="btn btn-primary">Search</button>
</form>

<hr>

{% for block in result %}
<div class="card p-3 mb-2">
<p><b>ID:</b> {{block.data.PatientID}}</p>
<p><b>Diagnosis:</b> {{block.data.Diagnosis}}</p>
<p><b>Treatment:</b> {{block.data.Treatment}}</p>
</div>
{% endfor %}

</div>
</body>
</html>
