<!DOCTYPE html>
<html>
<head>
<title>Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">🏥 Healthcare System</span>
<div>
<a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
<a href="/search" class="btn btn-light btn-sm">Search</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>
</nav>

<div class="container mt-4">

<h2>📊 Records</h2>

{% for block in chain %}
<div class="card mb-3 p-3 shadow">

{% if block.index == 0 %}
<p><b>Genesis Block</b></p>
{% else %}
<p><b>ID:</b> {{block.data.PatientID}}</p>
<p><b>Diagnosis:</b> {{block.data.Diagnosis}}</p>
<p><b>Treatment:</b> {{block.data.Treatment}}</p>

<a href="/edit/{{block.index}}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{block.index}}" class="btn btn-danger btn-sm">Delete</a>
{% endif %}

</div>
{% endfor %}

</div>
</body>
</html>
